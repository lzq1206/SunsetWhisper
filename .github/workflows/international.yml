name: Deploy to GitHub Pages (International)

on:
  push:
    branches:
      - main
  schedule:
    - cron: '30 13 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build forecast payload
        run: npm run build
        env:
          TZ: Asia/Shanghai
          NODE_OPTIONS: '--max-old-space-size=4096'
          TARGET_GROUP: 'international'

      - name: Cache forecast data
        run: |
          if [ -f data/latest.json ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/latest.json
            git diff --cached --quiet || git commit -m "chore: update cached forecast data [skip ci]"
            git push || echo "Push failed, continuing..."
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
